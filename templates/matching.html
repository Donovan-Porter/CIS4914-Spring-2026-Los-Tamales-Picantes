

{% extends "base.html" %}


{% block title %}
Matching Game
{% endblock %}


{% block head %}
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}" >
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/matching.css') }}" >
{% endblock %}


{% block body %}
<div class="match-game-container">
    <div class="match-game-header">
        <img src="{{ url_for('static', filename='images/picantecapy.png') }}" alt="Capy Decor" class="match-decor-image" draggable="false">

        <div class="match-top-container">
            <h1>Matching Game</h1>

            <div class="points-container">
                <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FFBF00" d="M283.84 867.84 512 747.776l228.16 119.936a6.4 6.4 0 0 0 9.28-6.72l-43.52-254.08 184.512-179.904a6.4 6.4 0 0 0-3.52-10.88l-255.104-37.12L517.76 147.904a6.4 6.4 0 0 0-11.52 0L392.192 379.072l-255.104 37.12a6.4 6.4 0 0 0-3.52 10.88L318.08 606.976l-43.584 254.08a6.4 6.4 0 0 0 9.28 6.72z"/>
                </svg>
                <span id="points-number">0</span>
            </div>
        </div>
        
        <hr class="matching-game-line" style="margin-left: 0vw;"> 

        <div id="dropdown-select">

            <label for="file_select">
                Choose File: 
            </label>
            <select name="file_type"  id="file_type" class="drop-options">
                <option value="Vocabulary">Vocabulary</option>
                <option value="Grammar">Grammar</option>
            </select>
            <select name="spn_lvl"  id="spn_lvl" class="drop-options">
                <option value="spn1130">Spanish 1130</option>
                <option value="spn1131">Spanish 1131</option>
                <option value="spn2200">Spanish 2200</option>
                <option value="spn2201">Spanish 2201</option>
            </select>
            <select name="chp_num"  id="chp_num" class="drop-options">
                <option value="1">Chapter 1</option>
                <option value="2">Chapter 2</option>
                <option value="3">Chapter 3</option>
                <option value="4">Chapter 4</option>
                <option value="5">Chapter 5</option>
                <option value="6">Chapter 6</option>
            </select>
            <br><br>
            <button class="file_bttn" id="load-file">Load File</button>
            <button class="hint_bttn" id="hint">Hint</button>
            <div id="timer-container">
                <svg width="2vw" height="5vh" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#000000" d="M9,0 C9.55229,0 10,0.447715 10,1 C10,1.55228 9.55229,2 9,2 L9,2.07089 C10.1894,2.24101 11.2823,2.71011 12.2001,3.3996 C12.2281,3.36242 12.259,3.32674 12.2929,3.29289 L13.2929,2.29289 C13.6834,1.90237 14.3166,1.90237 14.7071,2.29289 C15.0976,2.68342 15.0976,3.31658 14.7071,3.70711 L13.7071,4.70711 C13.6733,4.74096 13.6376,4.77187 13.6004,4.79985 C14.4792,5.9698 15,7.42409 15,9 C15,12.866 11.866,16 8,16 C4.13401,16 1,12.866 1,9 C1,5.47353 3.60771,2.55612 7,2.07089 L7,2 C6.44772,2 6,1.55228 6,1 C6,0.447715 6.44772,0 7,0 L9,0 Z M8,4 C5.23858,4 3,6.23858 3,9 C3,11.7614 5.23858,14 8,14 C10.7614,14 13,11.7614 13,9 C13,6.23858 10.7614,4 8,4 Z M8,5 C8.55229,5 9,5.44772 9,6 L9,8.58579 L10.7071,10.2929 C11.0976,10.6834 11.0976,11.3166 10.7071,11.7071 C10.3166,12.0976 9.68342,12.0976 9.29289,11.7071 L7,9.41421 L7,6 C7,5.44772 7.44772,5 8,5 Z"/>
                </svg>
                <span id="time">0</span>
            </div>
            <div id="hint-container" class="hint-container"></div>
        </div>
    </div>

    <hr class="matching-game-line" style="margin-left: 13vw;"> 

    <div class="board-container">
        <div id="board"></div>
    </div>

    <div class="match-result-container">
        <div id="match-count">Matches: 0</div>
        <div id="status"></div>

        <button id="home-button" class="home-button">Return to Homepage</button>
    </div>

{% include 'matching_script.html' %}


</div>
{% endblock %}
