
<!DOCTYPE HTML>

<head>
  <title>
    Learn - El Tamale Picante
  </title>
</head>


<span class="header"></span>

<img src="{{ url_for('static', filename='images/capy.png') }}" alt="Capy Decor" class="main-decor-image" draggable="false">

<div>
  <h1 class="main-choose-msg">¡Vamos aprender! Choose an activity to get started!</h1>
  <span style="margin-left: 1vw;"> {{login_message}} </span>
  <div class="main-game-container">
      <a class="game-bttn" href="{{ url_for('matching_page') }}" title="Matching Game">
          Matching Game
      </a>
      <a class="game-bttn" href="{{ url_for('choose_course_convo') }}" title="Conjugation Conversations">
          Conjugation Conversations
      </a>
      <a class="game-bttn" href="{{ url_for('flashcard_page') }}" title="Flashcard Game">
          Flashcard Game
      </a>
  </div>

  <div style="text-align: center;">
      <p id="timer_status"> Timer: ON </p>

      <label class="switch">
          <input type="checkbox" id="timerToggle" checked>
          <span class="slider round"></span>
      </label>
  </div>

</div>

<script async type="text/javascript" src="{{ url_for('static', filename='javascript/header.js') }}"></script>
<script>
    header = document.querySelector(".header");

    window.onload = loadTimerToggle;

    timerToggle.addEventListener("change", setTimerToggle);

    function setTimerToggle() {
        const timerToggle = document.getElementById('timerToggle')
        const status = timerToggle.checked;

        document.getElementById('timer_status').textContent = status ? 'Timer: ON' : 'Timer: OFF';

        // passing into backend variable
        fetch({{ url_for('toggle_timer') }}, {
            method: 'POST',
            headers: {
                'Content-Type' : 'application/json'
            },
            body: JSON.stringify({status: status})
        })
        .then(response => response.json())
        .then(data => {
            console.log(data)
        })

        .catch(error => {
            console.log('Error', error)
        });
    }

    function loadTimerToggle() {
        fetch({{ url_for('toggle_timer') }}, {
            method: 'GET',
        })
        .then(response => response.json())
        .then(data => {
            console.log(data.status);
            document.getElementById('timerToggle').checked = data.status;
            document.getElementById('timer_status').textContent = data.status ? 'Timer: ON' : 'Timer: OFF';

        })
        .catch(error => {
            console.log('Error', error)
        });
    }

</script>

<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}" >
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/index.css') }}" >
