<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Choose Group</title></head>
  <body>
    <h1>Choose Group in {{ vocab_file }}</h1>
    <form method="post" onsubmit="showLoad()">
      <ul>
        {% for g in groups %}
        <li>
          <label>
            <input type="radio" name="group_index" value="{{ loop.index0 }}" {{ 'checked' if loop.index0 == 0 else '' }}>
            {{ g['title'] }}
          </label>
        </li>
        {% endfor %}
      </ul>
      <input type="hidden" name="course" value="{{ course }}">
      <input type="hidden" name="file" value="{{ vocab_file }}">
      <button id="submit-bttn" type="submit">Start Exercise</button>
    </form>
    <p><a href="{{ url_for('choose_chapter_convo') }}?course={{ course }}">Back</a></p>
  </body>
</html>

<style>

  .ellipsis {
      display: inline-block;
      width: 24px;
      text-align: left;
      font-weight: bold;
  }

  .ellipsis span {
      display: inline-block;
      animation: bounce 1.4s infinite;
      font-size: 20px;
      margin-right: 2px;

      color: black;
  }

  .ellipsis span:nth-child(1) { animation-delay: 0s; }
  .ellipsis span:nth-child(2) { animation-delay: 0.2s; }
  .ellipsis span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
  }

</style>

<script>
    function showLoad()
    {
        const submitBttn = document.getElementById('submit-bttn');
        const options = document.querySelectorAll('input[type="radio"]');

        for (var i = 0; i < options.length ; i++)
        {
          options[i].disabled = true;
        }

        const ellipsis = document.createElement("span");
        ellipsis.classList.add("ellipsis");
        ellipsis.innerHTML = '<span>.</span><span>.</span><span>.</span>'

        submitBttn.innerHTML = "";
        submitBttn.appendChild(ellipsis);

        submitBttn.disabled = true;

        return true;
    }
</script>
