<!DOCTYPE HTML>

<head>
    <title>
        Sign Up
    </title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/signup.css">
</head>

<span class="header"></span>
<script async type="text/javascript" src="{{ url_for('static', filename='/static/javascript/header.js') }}"></script>


<div class="signup-container">
    <div class="welcome-container">
        <span>¡Bienvenido! ¿Listo para jugar?</span>
        <img src="/static/images/picantecapy.png" alt="Logo" class="profile-image" draggable="false">
    </div>

    <div class="signup-section">
        <span class="signup-title">Sign Up</span>
        <form id="signup-form" action="{{url_for('sign_up')}}" method="POST">
            <div>
                <label for="">Username</label>
                <input id="username" type="username" name="username">
            </div>

            <button type="submit">
                Sign Up
            </button>
        </form>


        <a id="login-link" href="/login" title="Login">Already have an account?</a>

    </div>

</div>
